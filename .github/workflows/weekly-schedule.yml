name: Daily Prayer Schedule Email

on:
  schedule:
    # Two cron entries so the email arrives at ~7 AM Central year-round.
    # The schedule gate below selects the DST-appropriate cron entry.
    - cron: '17 12 * * *'   # 12:17 UTC = 7:17 AM CDT (Mar-Nov)
    - cron: '17 13 * * *'   # 13:17 UTC = 7:17 AM CST (Nov-Mar)
  workflow_dispatch:
    inputs:
      send_emails:
        description: 'Send real emails (set to false for preview/testing)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: prayer-schedule
  cancel-in-progress: false

jobs:
  generate-schedule:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.schedule_gate.outputs.skip != 'true' }}

    permissions:
      contents: write  # Required to push changes back to repo
      issues: write    # Required to create issue on failure

    steps:
    - name: Check schedule gate
      if: github.event_name == 'schedule'
      id: schedule_gate
      env:
        EVENT_SCHEDULE: ${{ github.event.schedule }}
      run: |
        CENTRAL_OFFSET=$(TZ='America/Chicago' date +%z)
        EXPECTED_CRON='17 13 * * *'
        if [ "$CENTRAL_OFFSET" = "-0500" ]; then
          EXPECTED_CRON='17 12 * * *'
        fi

        echo "Central UTC offset: $CENTRAL_OFFSET"
        echo "Triggered cron: $EVENT_SCHEDULE"
        echo "Expected cron today: $EXPECTED_CRON"

        if [ "$EVENT_SCHEDULE" != "$EXPECTED_CRON" ]; then
          echo "Skipping duplicate daily run from the non-matching DST cron entry"
          echo "skip=true" >> "$GITHUB_OUTPUT"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Checkout repository
      if: steps.schedule_gate.outputs.skip != 'true'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Set up Python
      if: steps.schedule_gate.outputs.skip != 'true'
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.11'

    - name: Run prayer schedule generator
      if: steps.schedule_gate.outputs.skip != 'true'
      env:
        # For scheduled runs, always send emails.
        # For manual runs, respect the send_emails input (defaults to false).
        EMAIL_ENABLED: ${{ github.event_name == 'schedule' && 'true' || inputs.send_emails || 'false' }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
      run: |
        python prayer_schedule_V10_DESKTOP_FIXED.py

    - name: Commit archive rollover (Mondays only)
      if: always() && steps.schedule_gate.outputs.skip != 'true'
      run: |
        # Current-week files and the log are NOT committed anymore — they
        # flow to Pages via the workflow artifact, regenerated every run.
        # Only new archive/ entries (created on Mondays when the schedule
        # rolls over) are committed, which cuts git history bloat ~95%.
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "GitHub Actions Bot"
        git add archive/
        if git diff --staged --quiet; then
          echo "No archive changes to commit"
        else
          git commit -m "Archive prayer schedule for $(date +%Y-%m-%d)"
          git push || echo "No changes to push (push failed)"
        fi

    - name: Upload schedule artifacts
      if: always() && steps.schedule_gate.outputs.skip != 'true'
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
      with:
        name: prayer-schedule-${{ github.run_number }}
        path: |
          Prayer_Schedule_Current_Week.html
          Prayer_Schedule_Current_Week.txt
          prayer_schedule_log.txt
        retention-days: 90
        if-no-files-found: warn

    - name: Create or update issue on failure
      if: failure() && github.event_name == 'schedule' && steps.schedule_gate.outputs.skip != 'true'
      run: |
        existing=$(gh issue list --label "bug" --state open --search "Prayer schedule generation failed" --json number -q '.[0].number' 2>/dev/null || true)
        if [ -z "$existing" ]; then
          gh issue create \
            --title "Prayer schedule generation failed on $(date +%Y-%m-%d)" \
            --body "The daily prayer schedule workflow failed. Please check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." \
            --label "bug"
        else
          gh issue comment "$existing" \
            --body "Still failing as of $(date +%Y-%m-%d). [Workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        fi
      env:
        GH_TOKEN: ${{ github.token }}

  deploy-pages:
    needs: generate-schedule
    if: needs.generate-schedule.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        ref: main

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.11'

    - name: Download schedule artifact
      uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6.0.0
      with:
        name: prayer-schedule-${{ github.run_number }}

    - name: Build landing page
      run: python build_landing_page.py

    - name: Prepare site directory
      run: |
        mkdir _site
        cp index.html _site/
        cp .nojekyll _site/
        cp Prayer_Schedule_Current_Week.html _site/
        cp Prayer_Schedule_Current_Week.txt _site/
        # Expose archive/ so landing-page links resolve.
        cp -r archive _site/archive

    - name: Setup Pages
      uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0
      with:
        enablement: true

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b  # v4.0.0
      with:
        path: '_site'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
