name: Daily Prayer Schedule Email

on:
  schedule:
    # Run every day at 1:00 PM UTC (8:00 AM CDT / 7:00 AM CST)
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      send_emails:
        description: 'Send real emails (set to false for preview/testing)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

jobs:
  generate-schedule:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Required to push changes back to repo
      issues: write    # Required to create issue on failure

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run prayer schedule generator
      env:
        # For scheduled runs, always send emails.
        # For manual runs, respect the send_emails input (defaults to false).
        EMAIL_ENABLED: ${{ github.event_name == 'schedule' && 'true' || inputs.send_emails || 'false' }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
      run: |
        python prayer_schedule_V10_DESKTOP_FIXED.py

    - name: Commit and push generated files
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "GitHub Actions Bot"
        git add Prayer_Schedule_Current_Week.html Prayer_Schedule_Current_Week.txt prayer_schedule_log.txt archive/
        git diff --staged --quiet || git commit -m "Auto-generate prayer schedule for $(date +%Y-%m-%d)"
        git push || echo "No changes to push"

    - name: Upload schedule artifacts
      uses: actions/upload-artifact@v4
      with:
        name: prayer-schedule-${{ github.run_number }}
        path: |
          Prayer_Schedule_Current_Week.html
          Prayer_Schedule_Current_Week.txt
          prayer_schedule_log.txt
        retention-days: 90
        if-no-files-found: warn

    - name: Create issue on failure
      if: failure() && github.event_name == 'schedule'
      run: |
        gh issue create \
          --title "Prayer schedule generation failed on $(date +%Y-%m-%d)" \
          --body "The daily prayer schedule workflow failed. Please check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." \
          --label "bug"
      env:
        GH_TOKEN: ${{ github.token }}

  deploy-pages:
    needs: generate-schedule
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Wait for push propagation
      run: sleep 30

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Prepare site directory
      run: |
        mkdir _site
        cp index.html _site/
        cp .nojekyll _site/
        cp Prayer_Schedule_Current_Week.html _site/ || true
        cp Prayer_Schedule_Current_Week.txt _site/ || true

    - name: Setup Pages
      uses: actions/configure-pages@v5
      with:
        enablement: true

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '_site'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
